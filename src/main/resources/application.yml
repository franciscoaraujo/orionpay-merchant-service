spring:
  application:
    port: 8085
    name: orionpay-merchant-service


  datasource:
    url: jdbc:postgresql://localhost:5432/orion_payments
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  data:
    redis:
      host: localhost
      port: 6379
  # --- CONFIGURAÇÃO DE E-MAIL (SMTP) ---
  mail:
    host: smtp.gmail.com
    port: 587
    username: bitwisebytes@gmail.com
    # ATENÇÃO: Use uma "Senha de App" gerada no Google (16 caracteres), não sua senha normal.
    # Tutorial: https://support.google.com/accounts/answer/185833
    password:  # Substitua isso pela Senha de App
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: true # Ativa logs detalhados do JavaMail para debug

server:
  port: 8080

# --- SEGURANÇA E JWT ---
jwt:
  secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
  access-token-expiration-minutes: 60
  refresh-token-expiration-days: 7

# --- CONFIGURAÇÃO DE RESILIÊNCIA (SRE) ---
resilience4j:
  circuitbreaker:
    instances:
      ledgerCircuitBreaker:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
        eventConsumerBufferSize: 10
  bulkhead:
    instances:
      ledgerBulkhead:
        maxConcurrentCalls: 5
        maxWaitDuration: 0ms
        registerHealthIndicator: true

# Exposição de métricas para Prometheus/Grafana
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, circuitbreakers, bulkheads
  endpoint:
    health:
      show-details: always
